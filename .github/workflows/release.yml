name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUTF8: 1
  AKAGI_MOCK_MODE: 0

jobs:
  pre-release-test:
    uses: ./.github/workflows/test.yml

  release:
    needs: pre-release-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          $clean_version = $version -replace '^v', ''
          echo "CLEAN_VERSION=$clean_version" >> $env:GITHUB_OUTPUT

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: akagi_backend/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            akagi_frontend/package-lock.json
            electron/package-lock.json

      - name: Cache Python virtual environment
        uses: actions/cache@v5
        id: venv-cache
        with:
          path: akagi_backend/.venv
          key: venv-build-${{ runner.os }}-py3.12-${{ hashFiles('akagi_backend/pyproject.toml') }}
          restore-keys: |
            venv-build-${{ runner.os }}-py3.12-

      - name: Install Python dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        working-directory: akagi_backend
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m pip install --upgrade pip
          pip install -e . "pyinstaller>=6.0.0"

      - name: Install JS dependencies
        run: |
          cd akagi_frontend && npm ci
          cd ../electron && npm ci

      - name: Build Electron App
        working-directory: electron
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.exe
            dist/release/*.zip
            dist/release/*.dmg
            dist/release/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          name: Release ${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: failed-build-artifacts-${{ matrix.os }}
          path: |
            dist/
            electron/**/*.log
          retention-days: 14
