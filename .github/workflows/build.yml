name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., x.y.z)"
        required: false
        default: "dev"
      skip_tests:
        description: "Skip test suite"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: 1
  AKAGI_MOCK_MODE: 0

jobs:
  test:
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/test.yml

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: akagi_backend/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            akagi_frontend/package-lock.json
            electron/package-lock.json

      - name: Cache Python virtual environment
        uses: actions/cache@v5
        id: venv-cache
        with:
          path: akagi_backend/.venv
          key: venv-build-${{ runner.os }}-py3.12-${{ hashFiles('akagi_backend/pyproject.toml') }}
          restore-keys: |
            venv-build-${{ runner.os }}-py3.12-

      - name: Install Python dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        working-directory: akagi_backend
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m pip install --upgrade pip
          pip install -e . "pyinstaller>=6.0.0"

      - name: Install JS dependencies
        run: |
          cd akagi_frontend && npm ci
          cd ../electron && npm ci

      - name: Build Electron App
        working-directory: electron
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: akagi-ng-${{ matrix.os }}-${{ github.event.inputs.version || 'dev' }}-${{ github.run_number }}
          path: |
            dist/release/*.exe
            dist/release/*.zip
            dist/release/*.dmg
            dist/release/*.tar.gz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: build-logs-${{ matrix.os }}-${{ github.run_number }}
          path: |
            electron/*.log
            dist/**/*.log
          retention-days: 7
          if-no-files-found: ignore
