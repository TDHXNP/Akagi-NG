name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: 1

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run Ruff linting
        working-directory: akagi_backend
        run: ruff check akagi_ng/

      - name: Run Ruff format check
        working-directory: akagi_backend
        run: ruff format --check akagi_ng/

  test-backend:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: akagi_backend/pyproject.toml

      - name: Cache Python virtual environment
        uses: actions/cache@v5
        id: venv-cache
        with:
          path: akagi_backend/.venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('akagi_backend/pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        working-directory: akagi_backend
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare libriichi
        shell: bash
        run: |
          # Detect platform and architecture
          if [ "$RUNNER_OS" == "Windows" ]; then
            SYS_STR="pc-windows-msvc"
            EXT="pyd"
            ARCH_STR="x86_64"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            SYS_STR="apple-darwin"
            EXT="so"
            ARCH_STR="aarch64"
          else
            SYS_STR="unknown-linux-gnu"
            EXT="so"
            ARCH_STR="x86_64"
          fi

          echo "Detected OS: $RUNNER_OS, Arch: $ARCH_STR"

          cp "lib/libriichi-3.12-${ARCH_STR}-${SYS_STR}.${EXT}" "lib/libriichi.${EXT}"
          cp "lib/libriichi3p-3.12-${ARCH_STR}-${SYS_STR}.${EXT}" "lib/libriichi3p.${EXT}"

      - name: Run unit tests with coverage
        working-directory: akagi_backend
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m pytest tests/ -k "not e2e" -v --tb=short \
            --cov=akagi_ng \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: success()
        with:
          files: akagi_backend/coverage.xml
          flags: backend
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: coverage-report-${{ matrix.os }}-py3.12
          path: akagi_backend/htmlcov/
          retention-days: 7

  lint-js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            akagi_frontend/package-lock.json
            electron/package-lock.json

      - name: Install dependencies
        run: |
          cd akagi_frontend && npm ci
          cd ../electron && npm ci

      - name: Run ESLint
        run: |
          cd akagi_frontend && npm run lint
          cd ../electron && npm run lint

      - name: Run Prettier format check
        run: |
          cd akagi_frontend && npx prettier --check .
          cd ../electron && npx prettier --check .

      - name: Run TypeScript check
        run: |
          cd akagi_frontend && npx tsc --noEmit --pretty
          cd ../electron && npx tsc --noEmit --pretty
